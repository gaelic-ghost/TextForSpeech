name: Swift

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Swift on macOS 26
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Report selected Xcode
        run: xcode-select --print-path

      - name: Show Swift version
        run: xcrun swift --version

      - name: Validate package manifest
        run: xcrun swift package dump-package

      - name: Build package
        run: xcrun swift build

      - name: Run test suite
        run: xcrun swift test
