name: Swift

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    name: Swift 6.3 on macOS 15
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Swift 6.3
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3"

      - name: Show Swift version
        run: swift --version

      - name: Validate package manifest
        run: swift package dump-package

      - name: Build package
        run: swift build

      - name: Run test suite
        run: swift test
